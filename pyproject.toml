[tool.ruff]
line-length = 320
target-version = "py311"

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "COM812", # formatter conflict
    "ISC001", # formatter conflict
    "D203",   # formatter conflict
    "D213",   # formatter conflict
    "INP001", # scripts/ is not a package
    "T201",   # print is fine in scripts
    "S603",   # subprocess input — n/a here, kept for symmetry
    "S607",
]

[tool.ruff.lint.per-file-ignores]
# EXE003: PEP 723 uv scripts use `uv run --script` shebang, not `python`
"scripts/*" = ["D", "EXE003"]

[tool.codespell]
skip = "github-metrics.svg,*.lock"
